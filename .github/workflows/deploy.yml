name: Deploy static site to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────
      # Preparar SSH (lo mantengo igual, funciona bien)
      # ────────────────────────────────────────────────
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # ────────────────────────────────────────────────
      # Copiar archivos al servidor (a una carpeta temporal)
      # ────────────────────────────────────────────────
      - name: Copy files to server (temp folder)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: "/home/${{ secrets.EC2_USER }}/deploy-temp"
          rm: true                        # limpia la carpeta temp antes de copiar

      # ────────────────────────────────────────────────
      # Mover archivos a la carpeta web real + arreglar permisos
      # ────────────────────────────────────────────────
      - name: Move files to /var/www/html + fix permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Iniciando despliegue en el servidor..."

            # Crear carpeta destino si no existe (por seguridad)
            sudo mkdir -p /var/www/html

            # Eliminar el archivo default de nginx (el "Welcome to nginx!")
            sudo rm -f /var/www/html/index.nginx-debian.html

            # Limpiar contenido anterior (solo si es sitio estático puro)
            sudo rm -rf /var/www/html/*

            # Copiar todo desde la carpeta temporal
            sudo cp -r /home/${{ secrets.EC2_USER }}/deploy-temp/* /var/www/html/

            # Corregir propietario y permisos (muy importante)
            sudo chown -R www-data:www-data /var/www/html/
            sudo chmod -R 755 /var/www/html/

            # Limpiar carpeta temporal
            sudo rm -rf /home/${{ secrets.EC2_USER }}/deploy-temp

            # Verificar configuración y recargar nginx
            sudo nginx -t && sudo systemctl reload nginx || {
              echo "Error al recargar nginx. Intentando restart..."
              sudo systemctl restart nginx
            }

            echo "Despliegue finalizado."
